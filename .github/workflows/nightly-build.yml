name: Nightly Build

on:
  workflow_dispatch

permissions:
  contents: read

env:
  STORE_FILE_PATH: /tmp/app-debug.keystore
  BUILD_JSON_PATH: build.json

jobs:
  build:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    if: github.repository_owner == 'fackwuwu'

    permissions:
      contents: read

    steps:
      - name: Fast Fail if secrets are missing
        if: ${{ secrets.KEYSTORE_CONTENT == '' || secrets.BUILD_JSON_CONTENT == '' }}
        run: |
          echo "::error title=Missing Secrets::KEYSTORE_CONTENT or BUILD_JSON_CONTENT secrets are missing! Aborting workflow."
          exit 1

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Add keystore and build.json from secrets
        run: |
          echo "${{ secrets.KEYSTORE_CONTENT }}" | base64 -d > $STORE_FILE_PATH
          echo "${{ secrets.BUILD_JSON_CONTENT }}" | base64 -d > $BUILD_JSON_PATH
          echo "Keystore and build.json added successfully."

      - name: Extract versionCode and version from config.xml
        id: extract_version
        run: |
          if [ ! -f config.xml ]; then
            echo "config.xml not found!"
            exit 1
          fi
          VERSION_CODE=$(grep 'versionCode=' config.xml | sed -E 's/.*versionCode="([0-9]+)".*/\1/')
          VERSION=$(grep -oP 'version="\K[0-9.]+' config.xml)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted Version Code: $VERSION_CODE"
          echo "Extracted Version: $VERSION"

      - name: Get Commit Hash
        id: commit
        run: |
          GIT_COMMIT=$(git rev-parse HEAD)
          SHORT_COMMIT_HASH=$(echo "$GIT_COMMIT" | cut -c 1-7)
          echo "SHORT_HASH=$SHORT_COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "FULL_HASH=$GIT_COMMIT" >> $GITHUB_OUTPUT

      - name: Install Node.js Packages
        run: npm install

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Run npm setup
        run: npm run setup

      - name: Build Nightly APK
        run: |
          node utils/storage_manager.mjs y
          npm run build paid dev apk
          mv platforms/android/app/build/outputs/apk/debug/app-debug.apk /tmp/app-debug-nightly.apk
          echo "✅ Nightly build completed successfully"

      - name: Upload Nightly APK (1 day expiration)
        uses: actions/upload-artifact@v4
        with:
          name: nightly-build-${{ steps.commit.outputs.SHORT_HASH }}
          path: /tmp/app-debug-nightly.apk
          retention-days: 1

      - name: Remove keystore and build.json
        run: |
          rm $STORE_FILE_PATH $BUILD_JSON_PATH
          echo "Keystore and build.json removed successfully."

      - name: Build Summary
        run: |
          echo "## ✅ Nightly Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.extract_version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ steps.commit.outputs.FULL_HASH }}" >> $GITHUB_STEP_SUMMARY
          echo "**Short Hash:** ${{ steps.commit.outputs.SHORT_HASH }}" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** nightly-build-${{ steps.commit.outputs.SHORT_HASH }}" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact Retention:** 1 day" >> $GITHUB_STEP_SUMMARY
